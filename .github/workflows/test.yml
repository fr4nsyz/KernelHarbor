name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        working-directory: ./cmd/analysis
        run: go mod download

      - name: Run unit tests
        working-directory: ./cmd/analysis
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./cmd/analysis/coverage.out

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Start Elasticsearch
        uses: elastic/elastic-github-actions/elasticsearch@master
        with:
          stack-version: '8.17.4'
          ssl-enabled: false

      - name: Wait for Elasticsearch
        run: |
          echo "Waiting for Elasticsearch..."
          for i in {1..30}; do
            if curl -s http://localhost:9200 > /dev/null 2>&1; then
              echo "Elasticsearch is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 10
          echo "Pulling models..."
          ollama pull nomic-embed-text
          ollama pull qwen2.5:7b
          echo "Models ready!"

      - name: Build analysis
        working-directory: ./cmd/analysis
        run: go build -o analysis .

      - name: Run analysis service
        working-directory: ./cmd/analysis
        run: |
          ./analysis &
          sleep 5

      - name: Run E2E tests
        working-directory: ./scripts
        run: |
          chmod +x e2e-test.sh
          ./e2e-test.sh

      - name: Cleanup
        if: always()
        run: |
          pkill -f analysis || true
          pkill -f ollama || true

  integration-tests:
    name: Integration Tests (eBPF Tracer)
    runs-on: ubuntu-latest
    needs: e2e-tests
    permissions:
      actions: write
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install eBPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: Build tracer
        working-directory: ./cmd/execve-tracer
        run: go build -o execve-tracer .

      - name: Build analysis
        working-directory: ./cmd/analysis
        run: go build -o analysis .

      - name: Start Elasticsearch
        uses: elastic/elastic-github-actions/elasticsearch@master
        with:
          stack-version: '8.17.4'
          ssl-enabled: false

      - name: Wait for Elasticsearch
        run: |
          echo "Waiting for Elasticsearch..."
          for i in {1..30}; do
            if curl -s http://localhost:9200 > /dev/null 2>&1; then
              echo "Elasticsearch is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 10
          echo "Pulling models..."
          ollama pull nomic-embed-text
          ollama pull qwen2.5:7b
          echo "Models ready!"

      - name: Run analysis service
        working-directory: ./cmd/analysis
        run: |
          ./analysis &
          sleep 5

      - name: Run integration tests
        working-directory: ./scripts
        run: |
          chmod +x integration-test.sh
          sudo ./integration-test.sh || echo "Integration tests skipped (requires eBPF)"

      - name: Cleanup
        if: always()
        run: |
          pkill -f execve-tracer || true
          pkill -f analysis || true
          pkill -f ollama || true
